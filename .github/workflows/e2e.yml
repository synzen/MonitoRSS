name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_API_PADDLE_KEY: ${{ secrets.BACKEND_API_PADDLE_KEY }}
  BACKEND_API_PADDLE_URL: https://sandbox-api.paddle.com
  BACKEND_API_PADDLE_WEBHOOK_SECRET: ${{ secrets.BACKEND_API_PADDLE_WEBHOOK_SECRET }}
  VITE_PADDLE_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}

jobs:
  chromium:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci -w e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (chromium shard ${{ matrix.shard }}/4)
        working-directory: e2e
        run: bash e2e-mock.sh --project=chromium --shard=${{ matrix.shard }}/4

  paddle:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci -w e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/download/2026.5.1/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Run E2E tests (paddle)
        working-directory: e2e
        run: bash e2e-mock.sh --project=paddle
